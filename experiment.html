<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experiment</title>
    <script src="jatos.js"></script>
    <script src="https://unpkg.com/jspsych@8.2.1"></script>
    <!-- plugins -->
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>

    <!-- stimuli -->
    <script src="stimuli.js"></script>

    <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />

</head>

<body>
    <script>
        // --------
        // title: Centered Self-Paced Reading, Logical Metonymy
        // experiment version: LM2604-EXP02S-LX; 2026-05-16
        // jsPsych version: 8.2.1
        // date: 2026-05-16
        // author: Martina Vokáčová
        //----------

        const EXPERIMENT_VERSION = "2026-06-08";

        // --- progress bar
        let progress_done = 0;
        let progress_total = 1;
        let suppress_practice_repeat = false;
        let allow_skip_practice = false;

        const LIST = 2; // POTŘEBA ZMĚNIT MANUÁLNĚ !!! 


        // --- inicializace ---
        const jsPsych = initJsPsych({
            show_progress_bar: true,
            auto_update_progress_bar: false,
            message_progress_bar: "",
            on_trial_start: jatos.addAbortButton,
            on_trial_finish: (data) => {
                const task = data?.task;

                if (task === "browser_check") return;
                if (task === "fixation") return;

                if (task === "practice_end_choice" && Number(data.response) === 0) {
                    return;
                }

                if (suppress_practice_repeat) {
                    const ignore =
                        task === "instructions" ||
                        task === "practice_spr" ||
                        data?.phase === "practice" ||
                        (task === "practice_end_choice");

                    if (ignore) return;
                }

                // Pro SPR trialy: progress se počítá za poslední slovo věty
                if ((task === "spr" || task === "practice_spr") && !data.is_last_word) return;

                progress_done += 1;
                if (jsPsych.progressBar) {
                    jsPsych.progressBar.progress = Math.min(progress_done / progress_total, 1);
                }
            },
            on_finish: () => {
                const inter = jsPsych.data.getInteractionData().values();
                const n_blur = inter.filter(e => e.event === "blur").length;
                const n_focus = inter.filter(e => e.event === "focus").length;
                const n_fullscreenexit = inter.filter(e => e.event === "fullscreenexit").length;
                const n_instructions =
                    jsPsych.data.get().filter({ task: "instructions" }).count();
                const did_repeat_instructions =
                    jsPsych.data.get().filter({ task: "instructions" }).values()
                        .some(r => Number(r.instructions_repeat) === 1) ? 1 : 0;
                const did_skip_practice =
                    jsPsych.data.get().filter({ task: "instructions" }).values()
                        .some(r => Number(r.instructions_repeat) === 1 && Number(r.response) === 1)
                        ? 1 : 0;

                jsPsych.data.addProperties({
                    ended_at_iso: new Date().toISOString(),
                    n_blur, n_focus, n_fullscreenexit,
                    n_instructions,
                    did_repeat_instructions, did_skip_practice,
                    interaction_data: JSON.stringify(jsPsych.data.getInteractionData().values())
                });

                jatos.endStudy(jsPsych.data.get().csv());
            }
        });


        // --- metadata ---
        const subject_id = jsPsych.randomization.randomID(15);
        jsPsych.data.addProperties({
            subject_id,
            started_at_iso: new Date().toISOString(),
            experiment_version: EXPERIMENT_VERSION,
        });


        // ========= PAGES =========
        const intro_page = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <div class="intro-top">
                  <img class="intro-logo" src="https://www.ff.cuni.cz/wp-content/uploads/2014/07/rgb1-1.png" alt="Filozofická fakulta UK">
                  <div class="intro-meta">
                    <div><strong>Experiment:</strong> Čtení s porozuměním</div>
                    <div class="intro-id"><strong>ID:</strong> LM2605-EXP0VV</div>
                  </div>
                </div>
                <hr class="intro-rule">
                <p>Dobrý den,</p>
                <p>moc děkujeme, že se účastníte tohoto experimentu. Experiment je součástí disertační práce Martiny Vokáčové, realizované na Ústavu českého jazyka a teorie komunikace Filozofické fakulty Univerzity Karlovy, a zkoumá faktory ovlivňující porozumění různým typům vět. V jeho průběhu se na obrazovce budou postupně, slovo po slově, zobrazovat krátké věty. Vaším úkolem bude věty číst svým přirozeným tempem.</p>
                <p>Experiment trvá přibližně 30 minut.</p>
                <p>Vaše anonymizované odpovědi budou zaznamenány a použity pouze pro vědecké účely. Z experimentu můžete kdykoliv odstoupit stisknutím tlačítka „Cancel“ v pravém dolním rohu. V takovém případě budou Vaše odpovědi vymazány.</p>
                <p><b>Důležité</b>: Experiment doporučujeme absolvovat na počítači. Na mobilních zařízeních nemusí fungovat správně.</p>
                <div class="consent-file">
                  <p><a href="informovany-souhlas.pdf"  target="_blank">Plné znění informovaného souhlasu (PDF)</a></p>
                </div>`,
            choices: ["Souhlasím s účastí a chci pokračovat"],
            css_classes: ["info-page", "intro-page", "center-page"],
            data: { task: "intro" },
            on_load: () => {
                const el = document.querySelector(".intro-id");
                if (el && typeof LIST !== "undefined") {
                    el.innerHTML = `<strong>ID:</strong> LM2605-EXP02-L${LIST}`;
                }
            }
        };

        const demographic_page = {
            type: jsPsychSurveyHtmlForm,
            css_classes: ["demo-page"],
            html: `
      <div class="demo-intro">
        <h2>Demografický dotazník</h2>
        <p>Před zahájením samotného experimentu Vás prosíme o poskytnutí následujících údajů.</p>
      </div>

      <p>
        <label for="native_lang">Mateřský jazyk</label>
        <select id="native_lang" name="native_lang" required>
          <option value="" selected>— vyberte —</option>
          <option value="czech">čeština</option>
          <option value="other">jiný</option>
        </select>
      </p>

      <p>
        <label for="age">Věk</label>
        <input id="age" name="age" type="number" min="5" max="120" required>
      </p>

      <p>
        <label for="gender">Pohlaví</label>
        <select id="gender" name="gender" required>
          <option value="" selected>— vyberte —</option>
          <option value="female">žena</option>
          <option value="male">muž</option>
          <option value="nonbinary">nebinární</option>
        </select>
      </p>

      <p>
        <label for="education">Nejvyšší dosažené vzdělání</label>
        <select id="education" name="education" required>
          <option value="" disabled selected>— vyberte —</option>
          <option value="primary">základní</option>
          <option value="secondary">středoškolské</option>
          <option value="higher">vysokoškolské</option>
        </select>
      </p>

    `,
            button_label: "Pokračovat",
            data: { task: "demographics" }
        };

        const INSTR_BODY_HTML = `
  <h2>Instrukce</h2>
  <p>V následující části budete číst různé věty. Ty se ale na obrazovce nebudou zobrazovat celé najednou ani automaticky. Budete je odkrývat postupně, slovo po slově, pomocí mezerníku. Vaším úkolem bude tímto způsobem číst text svým přirozeným tempem.</p>
  <ul>
    <li><strong>Začátek úseku:</strong> Před začátkem každé věty nebo dvojice vět (např. <i>Anna uměla dobře využívat čas. Anna vyrazila na ostrov ještě před rozbřeskem.</i>) uvidíte uprostřed obrazovky symbol křížku <strong>+</strong>. Jakmile budete připraveni dát se do čtení, stiskněte mezerník (na počítači), nebo klepněte na obrazovku (na mobilu či tabletu).</li>
    <li><strong>Ovládání:</strong> Každé další slovo se na obrazovce objeví po stisknutí <strong>mezerníku</strong> (nebo klepnutí na obrazovku v případě mobilu či tabletu).</li>
    <li><strong>Čtěte pozorně:</strong> Vnímejte prosím obsah textu. Po některých větách se na obrazovce objeví krátká otázka ověřující, zda nebo jak jste větě porozuměli. Některé otázky nemají správnou nebo jasnou odpověď. Pokud si nebudete jistí, uvádějte odpověď, která je podle Vás nejpravděpodobnější. Pokud Vás napadne nebo Vás otázka přímo vyzve k uvedení více odpovědí, oddělujte je prosím středníkem.</li>
    <li><strong>Čtěte plynule:</strong> Pokud byste potřebovali přestávku, udělejte si ji prosím pouze ve chvíli, kdy je na obrazovce zobrazen křížek.</li>
    <li><strong>Čtěte vlastním tempem:</strong> Nemusíte nikam spěchat, ale ani nad slovy zbytečně dlouho přemýšlet – zkrátka čtěte tak, jak jste běžně zvyklí. Nejedná se o žádný test, správná ani špatná rychlost neexistuje.</li>
  </ul>
`;

        const instructions_page = {
            type: jsPsychHtmlButtonResponse,
            css_classes: ["info-page"],
            data: { task: "instructions", phase: "practice" },

            stimulus: () => {
                if (!allow_skip_practice) {
                    return INSTR_BODY_HTML + `<p class="intro-note">Úlohu si nyní můžete vyzkoušet na dvou příkladech.</p>`;
                }
                return INSTR_BODY_HTML + `
      <p class="intro-note">
        Úlohu si znovu můžete vyzkoušet na dvou příkladech. Pokud je vše jasné, příklady můžete přeskočit a pokračovat na samotný experiment.
      </p>
    `;
            },

            choices: () => {
                return !allow_skip_practice
                    ? ["Vyzkoušet na příkladech"]
                    : ["Vyzkoušet na příkladech", "Přeskočit příklady"];
            },

            button_html: (choice, choice_index) => {
                const cls = (allow_skip_practice && choice_index === 0) ? "btn-secondary" : "";
                return `<button class="jspsych-btn ${cls}">${choice}</button>`;
            },

            on_finish: (data) => {
                data.instructions_repeat = allow_skip_practice ? 1 : 0;
            }
        };


        const feedback_page = {
            type: jsPsychSurveyHtmlForm,
            html: `
      <p>Děkujeme za Váš čas! Experiment je u konce, prosíme Vás už jen o kliknutí na tlačítko níže, aby se odeslaly Vaše odpovědi.</p>
      <p>Pokud máte k experimentu jakékoli poznámky, můžete nám je zanechat zde. V případě dotazů se můžete obrátit na e-mail martina.vokacova@ff.cuni.cz</p>
      <p><textarea id="feedback_comments" name="feedback_comments" rows="4" cols="50"></textarea></p>
    `,
            button_label: "Ukončit experiment a odeslat výsledky",
            css_classes: ["feed-page"],
            data: { task: "feedback" }
        };


        const enter_fullscreen = {
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            delay_after: 0,
            message:
                "<p>Kliknutím na tlačítko níže povolíte režim celé obrazovky a zahájíte experiment.</p>",
            button_label: "Zahájit experiment",
            css_classes: ["info-page", "center-page"],
            on_load: () => {
                moveProgressIntoTarget();
            }
        };


        // ========= SPR block =========
        // data každého word-trialu obsahují: task, word, word_index (1-based), word_count, is_last_word, sentence + vše z extraData
        // RT se ukládá automaticky do data.rt
        const makeSPRBlock = ({
            sentence,
            task = "spr",
            extraData = {}
        } = {}) => {
            const words = sentence.trim().split(/\s+/);

            const isMobile = () => window.matchMedia("(hover: none) and (pointer: coarse)").matches;

            const makeTapHandler = () => ({
                on_load: () => {
                    if (!isMobile()) return;
                    const tap = document.getElementById("spr-tap");
                    if (tap) tap.addEventListener("touchstart", (e) => {
                        e.preventDefault();
                        jsPsych.finishTrial();
                    }, { passive: false });
                }
            });

            const fixation = {
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div class="spr-fixation">+</div><div class="spr-tap-area" id="spr-tap"></div>',
                choices: [" "],
                css_classes: ["trial-page", "spr-page"],
                data: { task: "fixation", sentence, ...extraData },
                ...makeTapHandler()
            };

            const wordTrials = words.map((word, i) => ({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `<div class="spr-word">${word}</div><div class="spr-tap-area" id="spr-tap"></div>`,
                choices: [" "],
                css_classes: ["trial-page", "spr-page"],
                data: {
                    task,
                    word,
                    word_index: i + 1,
                    word_count: words.length,
                    is_last_word: i === words.length - 1,
                    sentence,
                    ...extraData
                },
                ...makeTapHandler()
            }));

            return [fixation, ...wordTrials];
        };

        // ========= question trial =========
        const makeQuestionTrial = (s) => {
            // console.log("makeQuestionTrial:", s.id, s.condition, s.question, s.question_type);
            if (!s.question) return null;


            const questionData = {
                task: "question",
                question_type: s.question_type ?? null,
                question: s.question,
                item_index: s.item_index ?? null,
                condition: s.condition ?? null,
                id: s.id ?? null,
                is_filler: s.is_filler ?? null
            };

            if (s.question_type === "ano" || s.question_type === "ne") {
                return {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: `<div class="question-text">${s.question}</div>`,
                    choices: ["Ano", "Ne"],
                    css_classes: ["question-page", "question-yesno"],
                    data: questionData
                };
            }

            // open -- povinné vyplnění + odbarvené tlačítko
            return {
                type: jsPsychSurveyHtmlForm,
                html: `<div class="question-text">${s.question}</div>
                       <input type="text" name="answer" autocomplete="off" id="question-input">`,
                button_label: "Pokračovat",
                css_classes: ["question-page"],
                data: questionData,
                on_load: () => {
                    console.log("question on_load fired, trial #" + (progress_done));
                    setTimeout(() => {
                        const btn = document.getElementById("jspsych-survey-html-form-next");
                        const input = document.getElementById("question-input");
                        const ac = new AbortController();
                        const sig = ac.signal;
                        btn.disabled = true;
                        btn.classList.remove("active");
                        input.addEventListener("input", () => {
                            const hasContent = input.value.trim().length > 0;
                            btn.disabled = !hasContent;
                            btn.classList.toggle("active", hasContent);
                            input.style.borderColor = "";
                            input.style.boxShadow = "";
                        }, { signal: sig });
                        input.addEventListener("blur", () => {
                            if (input.value.trim().length === 0) {
                                input.style.borderColor = "#f87171";
                                input.style.boxShadow = "0 0 0 3px rgba(248,113,113,0.22)";
                            }
                        }, { signal: sig });
                        document.addEventListener("jspsych-finish-trial", () => {
                            console.log("abort called");
                            ac.abort();
                        }, { once: true });
                    }, 50);
                }

            };
        };

        // ========= category-aware shuffle =========
        const shuffleNoCloseCategories = (items, { key = "category", gap = 2, maxAttempts = 500 } = {}) => {
            const getCat = (it) => {
                const v = it?.[key];
                const s = (v ?? "").toString().trim();
                return s === "" ? "__MISSING__" : s;
            };

            const n = items.length;

            const countsObj = {};
            for (const it of items) {
                const c = getCat(it);
                countsObj[c] = (countsObj[c] || 0) + 1;
            }
            const counts = Object.values(countsObj);
            const maxCount = counts.length ? Math.max(...counts) : 0;
            const minNNeeded = (maxCount - 1) * (gap + 1) + 1;
            const maybeImpossible = minNNeeded > n;

            const attemptOnce = () => {
                const buckets = new Map();
                for (const it of jsPsych.randomization.shuffle(items)) {
                    const c = getCat(it);
                    if (!buckets.has(c)) buckets.set(c, []);
                    buckets.get(c).push(it);
                }

                const remaining = new Map([...buckets.entries()].map(([c, arr]) => [c, arr.length]));
                const out = [];
                const cooldown = [];

                for (let pos = 0; pos < n; pos++) {
                    const blocked = new Set(cooldown);

                    const eligible = [];
                    for (const [c, cnt] of remaining.entries()) {
                        if (cnt > 0 && !blocked.has(c)) eligible.push([c, cnt]);
                    }
                    if (eligible.length === 0) return null;

                    const bestCnt = Math.max(...eligible.map(([, cnt]) => cnt));
                    const bestCats = eligible.filter(([, cnt]) => cnt === bestCnt).map(([c]) => c);
                    const chosen = bestCats[Math.floor(Math.random() * bestCats.length)];

                    const arr = buckets.get(chosen);
                    out.push(arr.pop());
                    remaining.set(chosen, remaining.get(chosen) - 1);

                    cooldown.push(chosen);
                    if (cooldown.length > gap) cooldown.shift();
                }

                return out;
            };

            for (let a = 0; a < maxAttempts; a++) {
                const out = attemptOnce();
                if (out) return { list: out, gapUsed: gap, maybeImpossible };
            }

            if (gap > 0) {
                const relaxed = shuffleNoCloseCategories(items, { key, gap: gap - 1, maxAttempts });
                return { ...relaxed, maybeImpossible: true };
            }

            return { list: jsPsych.randomization.shuffle(items), gapUsed: 0, maybeImpossible: true };
        };

        const checkMinGap = (list, key = "category", gap = 2) => {
            for (let i = 0; i < list.length; i++) {
                const c = (list[i]?.[key] ?? "__MISSING__").toString().trim();
                for (let j = 1; j <= gap; j++) {
                    if (i + j < list.length) {
                        const c2 = (list[i + j]?.[key] ?? "__MISSING__").toString().trim();
                        if (c2 === c) return false;
                    }
                }
            }
            return true;
        };


        // ========= přestěhování progressbaru do fullscreenu =========
        const moveProgressIntoTarget = () => {
            const pb = document.querySelector("#jspsych-progressbar-container");
            const target = document.querySelector("#jspsych-target") || document.body;
            if (pb && target && !target.contains(pb)) target.prepend(pb);
        };


        // ========= trial k získání infa o prohlížeči =========
        const browser_check = {
            type: jsPsychBrowserCheck,
            data: { task: "browser_check" },
            on_finish: (data) => {
                jsPsych.data.addProperties({
                    width: data.width,
                    height: data.height,
                    webaudio: data.webaudio,
                    fullscreen: data.fullscreen,
                    webcam: data.webcam,
                    microphone: data.microphone,
                    vsync_rate: data.vsync_rate,
                    browser: data.browser,
                    browser_version: data.browser_version,
                    os: data.os,
                    mobile: data.mobile
                });
            }
        };


        // ========= PRACTICE BLOK =========
        const practice_sentences = [
            {
                sentence: "Tomáš se v podtrhávání přímo vyžíval. Tomáš vypotřeboval oranžový zvýrazňovač.",
                question: "Jaký zvýrazňovač vypotřeboval Tomáš?",
                question_type: "open"
            },
            {
                sentence: "Kika nikdy neměla ráda zvedání.",
                question: "Měla Kika ráda zvedání?",
                question_type: "ne"
            }
        ];

        const practice_trials = practice_sentences.flatMap((s, i) => {
            const sprBlock = makeSPRBlock({
                sentence: s.sentence,
                task: "practice_spr",
                extraData: { phase: "practice", item_index: i + 1 }
            });
            const questionTrial = makeQuestionTrial({
                question: s.question,
                question_type: s.question_type,
                condition: null,
                id: null,
                is_filler: null,
                item_index: i + 1
            });
            return questionTrial ? [...sprBlock, questionTrial] : sprBlock;
        });

        const practice_end_page = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `<p>
      Dokončili jste cvičný blok. Pokud chcete, můžete se vrátit k instrukcím a projít si je ještě jednou.
      Pokud je vše jasné, pokračujte prosím na samotný experiment.
    </p>`,
            choices: ["Zpět na instrukce", "Pokračovat"],
            css_classes: ["info-page", "center-page"],

            button_html: (choice, choice_index) => {
                const cls = choice_index === 0 ? "btn-secondary" : "btn-primary";
                return `<button class="jspsych-btn ${cls}">${choice}</button>`;
            },
            data: { task: "practice_end_choice" }
        };

        const practice_block = {
            timeline: [...practice_trials, practice_end_page],
            conditional_function: () => {
                if (!allow_skip_practice) return true;
                const last = jsPsych.data.get().last(1).values()[0];
                return Number(last.response) === 0;
            }
        };

        const instructions_block = {
            timeline: [instructions_page, practice_block],
            loop_function: (data) => {
                const last = data.last(1).values()[0];

                const goBack =
                    last?.task === "practice_end_choice" &&
                    Number(last.response) === 0;

                suppress_practice_repeat = goBack;
                if (goBack) allow_skip_practice = true;

                return goBack;
            }
        };


        // ========= VÝBĚR JMÉNA PRO KAŽDÝ ITEM =========
        // pool jmen: délka 5, pouze f nebo m (bez b) a jenom "normal"
        const names5 = names.filter(n => n.name.length === 5 && (n.gender === "f" || n.gender === "m") && n.normal === "y");
        if (names5.length === 0) throw new Error("Žádné jméno délky 5 v poli names!");
        // pool pro fillery -- jakékoli f nebo m jméno
        const namesF = names.filter(n => n.gender === "f" && !(n.name.length === 5 && n.normal === "y"));
        const namesM = names.filter(n => n.gender === "m" && !(n.name.length === 5 && n.normal === "y"));



        // ========= STIMULY =========
        const COND_FIELDS = {
            RAW: { f: "condition_RAW_f", m: "condition_RAW_m", list: "list_RAW_spr", q_f: "question_RAW_f", q_m: "question_RAW_m" },
            EV: { f: "condition_EV_f", m: "condition_EV_m", list: "list_EV_spr", q_f: null, q_m: null },
            CONTEXT: { f: "condition_CONTEXT_f", m: "condition_CONTEXT_m", list: "list_CON_spr", q_f: "question_CONTEXT_f", q_m: "question_CONTEXT_m" },
            NONSENSE: { f: "condition_NONSENSE_f", m: "condition_NONSENSE_m", list: "list_NON_spr", q_f: "question_NONSENSE_f", q_m: "question_NONSENSE_m" }
        };

        const expandedStimuli = [];
        for (const s of stimuli) {
            for (const [cond, fields] of Object.entries(COND_FIELDS)) {
                if (s[fields.list] === LIST) {
                    expandedStimuli.push({
                        id: s.id,
                        id_pairs: s.id_pairs,
                        category: s.category,
                        object: s.object,
                        afp: s.afp,
                        verb: s.verb,
                        afp_no: s.afp_no,
                        condition: cond,
                        item_f: s[fields.f],
                        item_m: s[fields.m],
                        raw_f: s.condition_RAW_f,
                        raw_m: s.condition_RAW_m,
                        question_f: fields.q_f ? s[fields.q_f] : null,
                        question_m: fields.q_m ? s[fields.q_m] : null,
                        question_type: "open",
                        is_filler: s.is_filler,
                        right_context: s.right_context ?? null
                    });
                }
            }
        }

        // zamíchaný pool jmen bez opakování
        const names5pool = jsPsych.randomization.shuffle([...names5]);
        let names5idx = 0;

        const stimuliWithName = expandedStimuli.map(sf => {
            const name = names5pool[names5idx++ % names5pool.length];
            const item = name.gender === "f" ? sf.item_f : sf.item_m;
            const raw_q = name.gender === "f" ? sf.question_f : sf.question_m;
            const question = raw_q ? raw_q.replace("[name]", name.name) : null;
            const rc = sf.right_context ?? null;
            const appendsRaw = sf.condition === "CONTEXT" || sf.condition === "NONSENSE";
            const rawItem = appendsRaw
                ? (name.gender === "f" ? sf.raw_f : sf.raw_m)
                : null;
            const sentence = appendsRaw
                ? name.name + " " + item + ". " + name.name + " " + rawItem + (rc ? " " + rc : "") + "."
                : name.name + " " + item + (rc ? " " + rc : "") + ".";
            return {
                ...sf,
                item,
                sentence,
                subject: name.name,
                subject_gender: name.gender,
                subject_origin: name.origin ?? null,
                question
            };
        });

        // společný pool fillerových jmen (f+m), zamíchaný
        const fillerNamePool = jsPsych.randomization.shuffle([...namesF, ...namesM]);
        let fillerNameIdx = 0;

        const fillersWithName = fillers.map(ff => {
            const name = fillerNamePool[fillerNameIdx++ % fillerNamePool.length];
            const useGender = name.gender;
            const item = useGender === "f" ? ff.filler_f : ff.filler_m;
            const raw_q = useGender === "f" ? ff.filler_question_f : ff.filler_question_m;
            const question = raw_q ? raw_q.replace("[name]", name.name) : null;
            return {
                id: ff.id,
                filler_type: ff.filler_type,
                is_making_sense: ff.is_making_sense ?? null,
                item,
                sentence: (ff[useGender === "f" ? "filler_context_f" : "filler_context_m"]
                    ? name.name + " " + ff[useGender === "f" ? "filler_context_f" : "filler_context_m"] + ". "
                    : "")
                    + name.name + " " + item + (ff.filler_right_context ? " " + ff.filler_right_context : "") + ".",
                subject: name.name,
                subject_gender: useGender,
                subject_origin: name.origin ?? null,
                category: ff.filler_type,
                is_filler: true,
                filler_right_context: ff.filler_right_context ?? null,
                question,
                question_type: ff.question_type ?? null
            };
        });

        // ========= SHUFFLE =========
        const CAT_GAP = 1;
        const allItems = [...stimuliWithName, ...fillersWithName].map(s => ({
            ...s,
            _shuffle_cat: `${s.category}|${s.condition}`
        }));
        const catShuffle1 = shuffleNoCloseCategories(allItems, { key: "category", gap: CAT_GAP, maxAttempts: 800 });
        let stimList = catShuffle1.list;
        const enforceCritGap = (list) => {
            for (let attempt = 0; attempt < 500; attempt++) {
                let ok = true;
                for (let i = 0; i < list.length - 1; i++) {
                    if (list[i].is_filler !== true && list[i + 1].is_filler !== true) {
                        const item = list.splice(i + 1, 1)[0];
                        const insertAt = Math.floor(Math.random() * list.length);
                        list.splice(insertAt, 0, item);
                        ok = false;
                        break;
                    }
                }
                if (ok) return list;
            }
            console.warn("enforceCritGap: nepodařilo se zajistit filler mezi ostrými");
            return list;
        };
        stimList = enforceCritGap(stimList);
        const cat_spacing_ok = checkMinGap(stimList, "category", CAT_GAP);

        // ========= MAIN TRIALS =========
        const main_trials = stimList.flatMap((s, i) => {
            const extraData = {
                phase: "main",
                item_index: i + 1,
                item: s.item,
                subject: s.subject,
                subject_gender: s.subject_gender,
                subject_origin: s.subject_origin ?? null,
                condition: s.condition,
                category: s.category,
                afp_no: s.afp_no ?? null,
                filler_type: s.filler_type ?? null,
                verb: s.verb ?? null,
                object: s.object ?? null,
                list: LIST,
                question: s.question ?? null,
                question_type: s.question_type ?? null,
                filler_right_context: s.filler_right_context ?? null,
                is_making_sense: s.is_making_sense ?? null
            };
            const sprBlock = makeSPRBlock({ sentence: s.sentence, task: "spr", extraData });
            const questionTrial = makeQuestionTrial({ ...s, item_index: i + 1 });
            return questionTrial ? [...sprBlock, questionTrial] : sprBlock;
        });

        // ========= TIMELINE =========
        const timeline = [
            intro_page,
            browser_check,
            demographic_page,
            instructions_block,
            enter_fullscreen,
            ...main_trials,
            feedback_page
        ];


        jatos.onLoad(() => {

            jsPsych.data.addProperties({
                jatos_worker_id: String(jatos.workerId ?? ""),
                jatos_study_result_id: String(jatos.studyResultId ?? ""),
                list: LIST,
                cat_spacing_ok
            });

            // progress_total: počítá věty + otázkové trialy
            const practiceQuestionCount = practice_sentences.filter(s => s.question).length;
            const mainQuestionCount = stimList.filter(s => s.question).length;
            progress_total =
                1 + // intro_page
                1 + // demographic_page
                1 + // instructions_page
                practice_sentences.length +    // practice SPR věty
                practiceQuestionCount +        // practice otázky
                1 + // practice_end_page
                1 + // enter_fullscreen
                stimList.length +              // main SPR věty
                mainQuestionCount +            // main otázky
                1;  // feedback_page

            progress_done = 0;
            suppress_practice_repeat = false;
            jsPsych.run(timeline);
        });
    </script>
